}

def verifyStreamlineProductionInputs = tasks.register("verifyStreamlineProductionInputs") {
	group = "verification"
	description = "Verifies the production Streamline SDK variant and Authenticode signatures."
	onlyIf { streamlineVariant == "production" && streamlinePlatform != null }
	doLast {
		if (streamlinePlatform == null) {
			throw new GradleException("Streamline production artifacts are Windows x64 only.")
		}
		def sdkRoot = streamlineSdkRootProvider.orNull
		if (sdkRoot == null) {
			throw new GradleException("STREAMLINE_SDK environment variable is not set.")
		}
		def vendorRoot = streamlineSdkVendorRoot(sdkRoot)
		if (vendorRoot.path.toLowerCase(java.util.Locale.ROOT).contains("development")) {
			throw new GradleException("Production Streamline packaging cannot use the development SDK directory.")
		}
		def missingNotices = streamlineNoticeFiles.keySet().findAll { !new File(sdkRoot, it).isFile() }
		if (!missingNotices.empty) {
			throw new GradleException("Missing Streamline distribution notice(s): ${missingNotices.join(', ')}")
		}
		def unsigned = streamlineVendorNames.findAll { name ->
			def candidate = new File(vendorRoot, name)
			if (!candidate.isFile() || !name.toLowerCase(java.util.Locale.ROOT).endsWith(".dll")) {
				return false
			}
			def process = new ProcessBuilder("powershell.exe", "-NoProfile", "-NonInteractive", "-Command",
					"(Get-AuthenticodeSignature -LiteralPath '${candidate.absolutePath.replace("'", "''")}').Status")
					.redirectErrorStream(true).start()
			def status = process.inputStream.getText("UTF-8").trim()
			process.waitFor()
			return status != "Valid"
		}
		if (!unsigned.empty) {
			throw new GradleException("Unsigned or unverifiable production Streamline binaries: ${unsigned.join(', ')}")
		}
	}
}

def bundleStreamlineNatives = tasks.register("bundleStreamlineNatives") {
	group = "build"
	description = "Bundles the pinned Streamline bridge and Windows x64 SDK binaries."
	inputs.property "streamlineVariant", streamlineVariant
	inputs.property "streamlineBridgeConfig", streamlineBridgeConfig
	if (streamlinePlatform != null) {
		def sdkForInputs = streamlineSdkRootProvider.getOrElse(file("__missing_streamline_sdk__"))
		inputs.files(fileTree(streamlineSdkVendorRoot(sdkForInputs)) {
			include streamlineVendorNames
		}).withPropertyName("streamlineSdk.${streamlineVariant}")
		inputs.files(streamlineNoticeFiles.keySet().collect { new File(sdkForInputs, it) })
			.withPropertyName("streamlineSdk.notices")
		inputs.file(streamlineBridgeOutput)
			.withPropertyName("streamlineBridge")
	}
	outputs.dir(streamlineNativeGenRoot)
	outputs.upToDateWhen { false }
	dependsOn(verifyStreamlineProductionInputs, buildStreamlineBridge)

	doLast {
		delete(streamlineNativeGenRoot)
		if (streamlinePlatform == null) {
			return
		}
		def sdkRoot = streamlineSdkRootProvider.orNull
		if (sdkRoot == null) {
			throw new GradleException("STREAMLINE_SDK environment variable is not set.")
		}
		def vendorRoot = streamlineSdkVendorRoot(sdkRoot)
		def bridge = streamlineBridgeOutput
		def missing = []
		if (!bridge.isFile()) {
			missing << "${bridge} (build native/streamline_bridge first)"
		}
		streamlineVendorNames.each { name ->
			if (!new File(vendorRoot, name).isFile()) {
				missing << new File(vendorRoot, name)
			}
		}
		streamlineNoticeFiles.keySet().each { name ->
			if (!new File(sdkRoot, name).isFile()) {
				missing << new File(sdkRoot, name)
			}
		}
		if (!missing.empty) {
			throw new GradleException("Missing Streamline ${streamlineVariant} Windows x64 inputs:\n - "
					+ missing.join("\n - "))
		}
		copy {
			from(bridge) {
				into "caustica/natives/windows-x64"
			}
			from(vendorRoot) {
				include streamlineVendorNames
				into "caustica/natives/windows-x64"
			}
			from(new File(vendorRoot, "nvngx_dlss.license.txt")) {
				rename { "NVIDIA-RTX-SDKS.txt" }
				into "META-INF/licenses/nvidia"
			}
			from(new File(vendorRoot, "reflex.license.txt")) {
				rename { "NVIDIA-REFLEX-SDK.txt" }
				into "META-INF/licenses/nvidia"
			}
			streamlineNoticeFiles.each { sourceName, packagedName ->
				from(new File(sdkRoot, sourceName)) {
					rename { packagedName }
					into "META-INF/licenses/nvidia"
				}
			}
			into streamlineNativeGenRoot
		}
	}
}

sourceSets.main.resources.srcDir(files(streamlineNativeGenRoot).builtBy(bundleStreamlineNatives))

// NRD is the cross-platform Vulkan reconstruction backend. Unlike Streamline it is built from a pinned
// public source revision and contains no vendor runtime DLL. CI builds this target once on Windows and
// once on Linux, then the release assembly can provide both payloads through NRD_WINDOWS_X64/NRD_LINUX_X64.
def nrdNativeGenRoot = layout.buildDirectory.dir("generated/nrd-natives")
def nrdBridgeSourceDir = file("native/nrd_bridge")
def nrdBridgeBuildDir = file("native/nrd_bridge/build-gradle")
def nrdOs = org.gradle.internal.os.OperatingSystem.current()
def nrdArch = System.getProperty("os.arch", "").toLowerCase(java.util.Locale.ROOT)
def nrdPlatform = (nrdArch == "x86_64" || nrdArch == "amd64")
		? (nrdOs.windows ? "windows-x64" : nrdOs.linux ? "linux-x64" : null) : null
def nrdFilename = nrdOs.windows ? "nrdbridge.dll" : "libnrdbridge.so"
def nrdLocalOutput = new File(layout.buildDirectory.get().asFile,
		"native/nrd_bridge/release/${nrdFilename}")
def nrdExtensionFilterTestOutput = new File(nrdBridgeBuildDir,
		nrdOs.windows ? "Release/nrdbridge_extension_filter_test.exe" : "nrdbridge_extension_filter_test")

def configureNrdBridge = tasks.register("configureNrdBridge", Exec) {
	group = "build"
	description = "Configures the pinned cross-platform NRD 4.17.3 Vulkan bridge."
	onlyIf { nrdPlatform != null }
	inputs.files(fileTree(nrdBridgeSourceDir) { include "CMakeLists.txt", "*.cpp", "*.h" })
	outputs.file(new File(nrdBridgeBuildDir, "CMakeCache.txt"))
	doFirst {
		def arguments = ["cmake", "-S", nrdBridgeSourceDir.absolutePath,
				"-B", nrdBridgeBuildDir.absolutePath, "-DCMAKE_BUILD_TYPE=Release"]
		if (nrdOs.windows) arguments.addAll(["-A", "x64"])
		commandLine arguments
	}
}

def buildNrdBridge = tasks.register("buildNrdBridge", Exec) {
	group = "build"
	description = "Builds NRD/NRI and Caustica's Vulkan bridge for the host platform."
	onlyIf { nrdPlatform != null }
	dependsOn(configureNrdBridge)
	inputs.files(fileTree(nrdBridgeSourceDir) { include "CMakeLists.txt", "*.cpp", "*.h" })
	outputs.files(nrdLocalOutput, nrdExtensionFilterTestOutput)
	commandLine "cmake", "--build", nrdBridgeBuildDir.absolutePath,
			"--config", "Release", "--target", "nrdbridge", "nrdbridge_extension_filter_test", "--parallel"
}

def testNrdBridge = tasks.register("testNrdBridge", Exec) {
	group = "verification"
	description = "Runs native NRD bridge contract tests."
	onlyIf { nrdPlatform != null }
	dependsOn(buildNrdBridge)
	commandLine "ctest", "--test-dir", nrdBridgeBuildDir.absolutePath,
			"--build-config", "Release", "--output-on-failure"
}

def bundleNrdNatives = tasks.register("bundleNrdNatives") {
	group = "build"
	description = "Bundles host NRD plus optional cross-platform release payloads."
	dependsOn(buildNrdBridge)
	outputs.dir(nrdNativeGenRoot)
	outputs.upToDateWhen { false }
	doLast {
		delete(nrdNativeGenRoot)
		def candidates = [
				"windows-x64": providers.environmentVariable("NRD_WINDOWS_X64").orNull,
				"linux-x64": providers.environmentVariable("NRD_LINUX_X64").orNull
		]
		if (nrdPlatform != null && nrdLocalOutput.isFile()) candidates[nrdPlatform] = nrdLocalOutput.absolutePath
		candidates.each { platform, candidatePath ->
			if (!candidatePath) return
			def candidate = file(candidatePath)
			if (!candidate.isFile()) throw new GradleException("Missing NRD ${platform} payload: ${candidate}")
			copy {
				from(candidate)
				into(new File(nrdNativeGenRoot.get().asFile, "caustica/natives/${platform}"))
			}
		}
		def license = new File(nrdBridgeBuildDir, "_deps/nrd-src/LICENSE.txt")
		if (license.isFile()) {
			copy {
				from(license) { rename { "NVIDIA-NRD.txt" } }
				into(new File(nrdNativeGenRoot.get().asFile, "META-INF/licenses/nvidia"))
			}
		}
	}
}

