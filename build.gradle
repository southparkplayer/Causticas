import javax.inject.Inject
import org.gradle.process.ExecOperations
import dev.comfyfluffy.caustica.build.GenerateShaderRecords

plugins {
	id "fabric-loom" version "${loom_version}"
	id "maven-publish"
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	maven {
		name = "Fabric"
		url = "https://maven.fabricmc.net/"
	}
	mavenCentral()
}

loom {
	runs {
		client {
			client()
			setConfigName("Fabric Client")
			ideConfigGenerated = true
			runDir = "run"
			// java.lang.foreign restricted methods (FFM bindings to amd_fidelityfx_vk.dll)
			vmArg "--enable-native-access=ALL-UNNAMED"

            // NVIDIA NGX (DLSS) allocates ~1MB on the stack during init, which overflows Java's default 1MB thread stack.
            // pass -Xss here directly so the main render thread is resized before the VM parses JAVA_TOOL_OPTIONS.
            vmArg "-Xss16m"

            // NixOS fix: Gradle forks drop the dev-shell's LD_LIBRARY_PATH.
            // We manually add the driver path so NVIDIA's Streamline plugins can load their driver runtime.
            if (file("/run/opengl-driver/lib").exists()) {
                def inherited = System.getenv("LD_LIBRARY_PATH")
                environmentVariable "LD_LIBRARY_PATH",
                        inherited ? "/run/opengl-driver/lib:${inherited}" : "/run/opengl-driver/lib"
            }
		}

		server {
			server()
			setConfigName("Fabric Server")
			ideConfigGenerated = true
			runDir = "run"
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	// Layered TOML config (config/caustica.toml) — NightConfig, the same library NeoForge's
	// ModConfigSpec is built on.
	include implementation("com.electronwill.night-config:core:3.8.3")
	include implementation("com.electronwill.night-config:toml:3.8.3")
	testImplementation "org.junit.jupiter:junit-jupiter:5.11.4"
	testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.11.4"
}

// Production is the normal artifact. Development plugins remain an explicit diagnostics-only build.
def streamlineVariant = (findProperty("streamlineVariant") ?: "production")
		.toString().toLowerCase(java.util.Locale.ROOT)
if (!(streamlineVariant in ["development", "production"])) {
	throw new GradleException("Unknown Streamline variant '${streamlineVariant}'. Expected 'development' or 'production'.")
}
def streamlineVulkanMailboxVsync = (findProperty("streamlineVulkanMailboxVsync") ?: "false")
		.toString().toBoolean()
if (streamlineVulkanMailboxVsync && streamlineVariant != "development") {
	throw new GradleException("Streamline 2.12 exposes vSyncConfig only in its development plugin; "
			+ "use -PstreamlineVariant=development with -PstreamlineVulkanMailboxVsync=true.")
}

processResources {
	inputs.property "version", project.version
	inputs.property "streamlineVariant", streamlineVariant
	inputs.property "streamlineVulkanMailboxVsync", streamlineVulkanMailboxVsync

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
	filesMatching("caustica/streamline.properties") {
		expand "streamlineVariant": streamlineVariant,
				"streamlineVulkanMailboxVsync": streamlineVulkanMailboxVsync
	}
}

// Compile GLSL and Slang sources to SPIR-V at build time instead of tracking binaries. Requires
// glslangValidator, slangc, and spirv-val from the Vulkan SDK or PATH.
def shaderGenRoot = layout.buildDirectory.dir("generated/shaders") // classpath root -> /caustica/rt/*.spv

def resolveVulkanTool = { String name ->
	def exe = org.gradle.internal.os.OperatingSystem.current().windows ? ".exe" : ""
	def sdk = System.getenv("VULKAN_SDK")
	if (sdk) {
		def fromSdk = file("${sdk}/Bin/${name}${exe}")
		if (fromSdk.exists()) {
			return fromSdk.absolutePath
		}
	}
	return "${name}${exe}" // fall back to PATH; exec fails with a clear message if absent
}

// Keep the Vulkan SDK and shader compiler identities independent. Streamline's native bridge needs the
// real Vulkan SDK, while production shaders are reviewed and accepted specifically with Slang 2026.13.
def requiredSlangVersion = "2026.13"
def configuredSlangc = (findProperty("slangc") ?: System.getenv("CAUSTICA_SLANGC"))?.toString()
if (!configuredSlangc) {
	throw new GradleException("Pinned Slang ${requiredSlangVersion} is required. Set CAUSTICA_SLANGC "
			+ "or pass -Pslangc=<path-to-slangc>.")
}
def pinnedSlangc = file(configuredSlangc)
if (!pinnedSlangc.isFile()) {
	throw new GradleException("Pinned Slang compiler does not exist: ${pinnedSlangc.absolutePath}")
}
def slangVersionProbe = providers.exec {
	commandLine pinnedSlangc.absolutePath, "-version"
}
def actualSlangVersion = (slangVersionProbe.standardOutput.asText.get()
		+ "\n" + slangVersionProbe.standardError.asText.get()).trim()
if (!actualSlangVersion.readLines().any { it.trim() == requiredSlangVersion }) {
	throw new GradleException("Expected Slang ${requiredSlangVersion}, got '${actualSlangVersion}' from "
			+ pinnedSlangc.absolutePath)
}

abstract class CompileShaders extends DefaultTask {
	@InputDirectory abstract DirectoryProperty getSrcDir()
	@OutputDirectory abstract DirectoryProperty getOutDir()
	@Input abstract Property<String> getGlslang()
	@Input abstract Property<String> getSpirvVal()
	@Input abstract Property<String> getSlangc()

	@Inject abstract ExecOperations getExecOps()

	// world.rgen.slang → "world.rgen"; world.rahit → "world.rahit" (GLSL names pass through).
	static String outBase(File src) {
		return src.name.endsWith(".slang") ? src.name.substring(0, src.name.length() - 6) : src.name
	}

	@TaskAction
	void compile() {
		def outDirFile = outDir.get().asFile
		// Slang stages are named <name>.<stage>.slang (world.rahit.slang → world.rahit.spv); module files
		// like world_common.slang match no stage glob and are picked up only via `import`.
		def stageIncludes = ["rgen", "rchit", "rahit", "rmiss", "rcall", "comp", "vert", "frag"]
				.collectMany { stage -> ["**/*.${stage}", "**/*.${stage}.slang"] }
		def validate = { File spv ->
			execOps.exec {
				commandLine spirvVal.get(), "--target-env", "vulkan1.2", spv.absolutePath
			}
		}
		def compileOne = { File src, File spv, List<String> defines ->
			execOps.exec {
				// -g (OpLine/OpSource debug info), not -gVS: the NonSemantic.Shader.DebugInfo form (-gVS)
				// emits OpExtInstWithForwardRefsKHR (SPV_KHR_relaxed_extended_instruction), which trips a
				// validation error unless the shaderRelaxedExtendedInstruction device feature is enabled.
				// -g keeps source-level debug info for Nsight/RenderDoc without needing that extension.
				commandLine([glslang.get(), "-V", "--target-env", "vulkan1.2", "-g"] + defines
						+ [src.absolutePath, "-o", spv.absolutePath])
			}
			validate(spv)
		}
		def compileOneSlang = { File src, File spv, List<String> extra ->
			execOps.exec {
				commandLine([slangc.get(), src.absolutePath, "-target", "spirv",
						"-profile", "spirv_1_5", "-matrix-layout-column-major",
						"-warnings-as-errors", "all", "-warnings-disable", "41012"] + extra
						+ ["-o", spv.absolutePath])
			}
			validate(spv)
		}
		def shaderFiles = srcDir.get().asFileTree.matching {
			include stageIncludes
		}.files.sort { it.absolutePath }
		def duplicateOutputs = shaderFiles
				.groupBy { "${outBase(it)}.spv" }
				.findAll { entry -> entry.value.size() > 1 }
		if (!duplicateOutputs.isEmpty()) {
			throw new GradleException("Duplicate shader output name(s): "
					+ duplicateOutputs.collect { entry -> "${entry.key} from ${entry.value*.path.join(', ')}" }.join("; "))
		}
		// Compile into Gradle's task-temporary directory. A compiler or validator failure leaves the last
		// successful published output intact instead of emptying build/generated/shaders halfway through.
		def scratchDir = new File(temporaryDir, "spv")
		if (scratchDir.exists() && !scratchDir.deleteDir()) {
			throw new GradleException("failed to clear shader scratch directory ${scratchDir}")
		}
		scratchDir.mkdirs()
		shaderFiles.each { src ->
			def base = outBase(src)
			def spv = new File(scratchDir, "${base}.spv")
			if (src.name.endsWith(".slang")) {
				// Build both SER encodings from one source; RtDeviceBringup selects the supported variant.
				compileOneSlang(src, spv, base == "world.rgen"
						? ["-capability", "spvShaderInvocationReorderEXT"] : [])
				if (base == "world.rgen") {
					compileOneSlang(src, new File(scratchDir, "world_nv.rgen.spv"),
							["-capability", "spvShaderInvocationReorderNV"])
				}
			} else {
				compileOne(src, spv, [])
			}
		}
		// Slang 2026.13 compiles the reviewed streamline-core raygen to 114,068 bytes. Glass-only is
		// allowed a small bounded delta, but never the multi-hundred-KB expansion that halved all-scene
		// performance in the rejected hybrid integration.
		["world.rgen.spv", "world_nv.rgen.spv"].each { name ->
			def raygen = new File(scratchDir, name)
			if (!raygen.isFile() || raygen.length() > 121_000L) {
				throw new GradleException("Glass-only world raygen complexity budget exceeded: ${name} is "
						+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 121000)")
			}
		}
		outDirFile.mkdirs()
		outDirFile.listFiles().findAll { it.isFile() && it.name.endsWith(".spv") }.each { it.delete() }
		scratchDir.listFiles().findAll { it.isFile() }.each { src ->
			java.nio.file.Files.move(src.toPath(), new File(outDirFile, src.name).toPath(),
					java.nio.file.StandardCopyOption.REPLACE_EXISTING)
		}
	}
}

def compileShaders = tasks.register("compileShaders", CompileShaders) {
	group = "build"
	description = "Compiles shaders/** shader sources to SPIR-V and validates them."
	srcDir = file("shaders")
	outDir = layout.buildDirectory.dir("generated/shaders/caustica/rt")
	glslang = resolveVulkanTool("glslangValidator")
	spirvVal = resolveVulkanTool("spirv-val")
	slangc = pinnedSlangc.absolutePath
}

def generateShaderRecords = tasks.register("generateShaderRecords", GenerateShaderRecords) {
	group = "build"
	description = "Generates typed Java shader records and serializers from Slang reflection."
	worldSourceDir = file("shaders/world")
	probeSource = file("shaders/world/world_layout_probe.slang")
	slangc = pinnedSlangc.absolutePath
	spirvVal = resolveVulkanTool("spirv-val")
	outDir = layout.buildDirectory.dir("generated/sources/shaderRecords")
}

sourceSets.main.java.srcDir(files(layout.buildDirectory.dir("generated/sources/shaderRecords")).builtBy(generateShaderRecords))

// Emit the .spv into the main resources so they land in the jar / on the runClient classpath at the
// same /caustica/rt/ path the loader (RtPipeline/RtBlendPipeline) reads. builtBy wires the dependency.
sourceSets.main.resources.srcDir(files(shaderGenRoot).builtBy(compileShaders))

// Streamline is the sole DLSS-RR and DLSSG runtime. The SDK zip is intentionally not checked into
// the repository; STREAMLINE_SDK must point at the verified NVIDIA Streamline 2.12.0 extraction.
def streamlineNativeGenRoot = layout.buildDirectory.dir("generated/streamline-natives")
def streamlineSdkEnv = providers.environmentVariable("STREAMLINE_SDK")
def streamlineSdkRootProvider = streamlineSdkEnv.map { file(it) }
def streamlineBridgeConfig = (findProperty("streamlineBridgeConfig") ?: "release")
		.toString().toLowerCase(java.util.Locale.ROOT)
def streamlinePlatform = {
	def os = org.gradle.internal.os.OperatingSystem.current()
	def arch = System.getProperty("os.arch", "").toLowerCase(java.util.Locale.ROOT)
	return os.windows && (arch == "x86_64" || arch == "amd64") ? "windows-x64" : null
}()
def streamlineVendorNames = [
	"sl.interposer.dll",
	"sl.common.dll",
	"sl.dlss_d.dll",
	"sl.dlss_g.dll",
	"sl.reflex.dll",
	"sl.pcl.dll",
	"nvngx_dlssd.dll",
	"nvngx_dlssg.dll",
	"NvLowLatencyVk.dll",
	"reflex.license.txt",
	"nvngx_dlss.license.txt"
]
def streamlineSdkVendorRoot = { File sdkRoot ->
	new File(sdkRoot, streamlineVariant == "development" ? "bin/x64/development" : "bin/x64")
}

def streamlineBridgeSourceDir = file("native/streamline_bridge")
def streamlineBridgeBuildDir = file("native/streamline_bridge/build")
def streamlineBridgeCmakeConfig = streamlineBridgeConfig.capitalize()
def streamlineBridgeOutput = new File(layout.buildDirectory.get().asFile,
		"native/streamline_bridge/${streamlineBridgeConfig}/streamlinebridge.dll")
def streamlineBridgeInitTestOutput = new File(layout.buildDirectory.get().asFile,
		"native/streamline_bridge/${streamlineBridgeConfig}/streamlinebridge_production_init_test.exe")
def vulkanSdkEnv = providers.environmentVariable("VULKAN_SDK")

def configureStreamlineBridge = tasks.register("configureStreamlineBridge", Exec) {
	group = "build"
	description = "Configures the Windows x64 Streamline bridge."
	onlyIf { streamlinePlatform != null }
	inputs.files(fileTree(streamlineBridgeSourceDir) { include "CMakeLists.txt", "*.h" })
	inputs.property("streamlineSdk", streamlineSdkEnv.orElse(""))
	inputs.property("vulkanSdk", vulkanSdkEnv.orElse(""))
	outputs.file(new File(streamlineBridgeBuildDir, "CMakeCache.txt"))
	doFirst {
		def sdkRoot = streamlineSdkRootProvider.orNull
		def vulkanRoot = vulkanSdkEnv.orNull
		if (sdkRoot == null) {
			throw new GradleException("STREAMLINE_SDK environment variable is not set.")
		}
		if (!vulkanRoot) {
			throw new GradleException("VULKAN_SDK environment variable is not set.")
		}
		commandLine "cmake", "-S", streamlineBridgeSourceDir.absolutePath,
				"-B", streamlineBridgeBuildDir.absolutePath, "-A", "x64",
				"-DSTREAMLINE_SDK=${sdkRoot.absolutePath}", "-DVULKAN_SDK=${file(vulkanRoot).absolutePath}"
	}
}

def buildStreamlineBridge = tasks.register("buildStreamlineBridge", Exec) {
	group = "build"
	description = "Builds the Windows x64 Streamline bridge."
	onlyIf { streamlinePlatform != null }
	dependsOn(configureStreamlineBridge)
	inputs.files(fileTree(streamlineBridgeSourceDir) { include "*.cpp", "*.h", "CMakeLists.txt" })
	outputs.file(streamlineBridgeOutput)
	doFirst {
		commandLine "cmake", "--build", streamlineBridgeBuildDir.absolutePath,
				"--config", streamlineBridgeCmakeConfig, "--parallel"
	}
}

def testStreamlineBridge = tasks.register("testStreamlineBridge", Exec) {
	group = "verification"
	description = "Runs the native Streamline bridge ABI tests."
	onlyIf { streamlinePlatform != null }
	dependsOn(buildStreamlineBridge)
	commandLine "ctest", "--test-dir", streamlineBridgeBuildDir.absolutePath,
			"-C", streamlineBridgeCmakeConfig, "--output-on-failure"
}

def testPackagedStreamlineBridge = tasks.register("testPackagedStreamlineBridge", Exec) {
	group = "verification"
	description = "Initializes the exact packaged production Streamline directory."
	onlyIf { streamlinePlatform != null && streamlineVariant == "production" }
	dependsOn("bundleStreamlineNatives")
	doFirst {
		def packagedDirectory = new File(streamlineNativeGenRoot.get().asFile,
				"caustica/natives/windows-x64")
		if (!streamlineBridgeInitTestOutput.isFile()) {
			throw new GradleException("Missing production initialization test: ${streamlineBridgeInitTestOutput}")
		}
		commandLine streamlineBridgeInitTestOutput.absolutePath,
				packagedDirectory.absolutePath,
				new File(layout.buildDirectory.get().asFile,
						"test-results/streamline-production-init").absolutePath
	}
}

def verifyStreamlineProductionInputs = tasks.register("verifyStreamlineProductionInputs") {
	group = "verification"
	description = "Verifies the production Streamline SDK variant and Authenticode signatures."
	onlyIf { streamlineVariant == "production" && streamlinePlatform != null }
	doLast {
		if (streamlinePlatform == null) {
			throw new GradleException("Streamline production artifacts are Windows x64 only.")
		}
		def sdkRoot = streamlineSdkRootProvider.orNull
		if (sdkRoot == null) {
			throw new GradleException("STREAMLINE_SDK environment variable is not set.")
		}
		def vendorRoot = streamlineSdkVendorRoot(sdkRoot)
		if (vendorRoot.path.toLowerCase(java.util.Locale.ROOT).contains("development")) {
			throw new GradleException("Production Streamline packaging cannot use the development SDK directory.")
		}
		def unsigned = streamlineVendorNames.findAll { name ->
			def candidate = new File(vendorRoot, name)
			if (!candidate.isFile() || !name.toLowerCase(java.util.Locale.ROOT).endsWith(".dll")) {
				return false
			}
			def process = new ProcessBuilder("powershell.exe", "-NoProfile", "-NonInteractive", "-Command",
					"(Get-AuthenticodeSignature -LiteralPath '${candidate.absolutePath.replace("'", "''")}').Status")
					.redirectErrorStream(true).start()
			def status = process.inputStream.getText("UTF-8").trim()
			process.waitFor()
			return status != "Valid"
		}
		if (!unsigned.empty) {
			throw new GradleException("Unsigned or unverifiable production Streamline binaries: ${unsigned.join(', ')}")
		}
	}
}

def bundleStreamlineNatives = tasks.register("bundleStreamlineNatives") {
	group = "build"
	description = "Bundles the pinned Streamline bridge and Windows x64 SDK binaries."
	inputs.property "streamlineVariant", streamlineVariant
	inputs.property "streamlineBridgeConfig", streamlineBridgeConfig
	if (streamlinePlatform != null) {
		def sdkForInputs = streamlineSdkRootProvider.getOrElse(file("__missing_streamline_sdk__"))
		inputs.files(fileTree(streamlineSdkVendorRoot(sdkForInputs)) {
			include streamlineVendorNames
		}).withPropertyName("streamlineSdk.${streamlineVariant}")
		inputs.file(streamlineBridgeOutput)
			.withPropertyName("streamlineBridge")
	}
	outputs.dir(streamlineNativeGenRoot)
	outputs.upToDateWhen { false }
	dependsOn(verifyStreamlineProductionInputs, buildStreamlineBridge)

	doLast {
		delete(streamlineNativeGenRoot)
		if (streamlinePlatform == null) {
			return
		}
		def sdkRoot = streamlineSdkRootProvider.orNull
		if (sdkRoot == null) {
			throw new GradleException("STREAMLINE_SDK environment variable is not set.")
		}
		def vendorRoot = streamlineSdkVendorRoot(sdkRoot)
		def bridge = streamlineBridgeOutput
		def missing = []
		if (!bridge.isFile()) {
			missing << "${bridge} (build native/streamline_bridge first)"
		}
		streamlineVendorNames.each { name ->
			if (!new File(vendorRoot, name).isFile()) {
				missing << new File(vendorRoot, name)
			}
		}
		if (!missing.empty) {
			throw new GradleException("Missing Streamline ${streamlineVariant} Windows x64 inputs:\n - "
					+ missing.join("\n - "))
		}
		copy {
			from(bridge) {
				into "caustica/natives/windows-x64"
			}
			from(vendorRoot) {
				include streamlineVendorNames
				into "caustica/natives/windows-x64"
			}
			into streamlineNativeGenRoot
		}
	}
}

sourceSets.main.resources.srcDir(files(streamlineNativeGenRoot).builtBy(bundleStreamlineNatives))

tasks.withType(Test).configureEach {
	useJUnitPlatform()
}

tasks.named("check").configure {
	dependsOn(testStreamlineBridge, testPackagedStreamlineBridge)
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

java {
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
	withSourcesJar()
}

tasks.named("jar", Jar).configure {
	from(rootProject.files("LICENSE.md", "COPYING", "COPYING.LESSER", "THIRD_PARTY_NOTICES.md")) {
		into "META-INF"
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
}
