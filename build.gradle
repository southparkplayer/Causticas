// Streamline is the sole DLSS-RR and DLSSG runtime. The SDK zip is intentionally not checked into
// the repository; STREAMLINE_SDK must point at the verified NVIDIA Streamline 2.12.0 extraction.
def streamlineNativeGenRoot = layout.buildDirectory.dir("generated/streamline-natives")
def streamlineSdkEnv = providers.environmentVariable("STREAMLINE_SDK")
def streamlineSdkRootProvider = streamlineSdkEnv.map { file(it) }
def streamlineBridgeConfig = (findProperty("streamlineBridgeConfig") ?: "release")
		.toString().toLowerCase(java.util.Locale.ROOT)
def streamlinePlatform = {
	def os = org.gradle.internal.os.OperatingSystem.current()
	def arch = System.getProperty("os.arch", "").toLowerCase(java.util.Locale.ROOT)
	return os.windows && (arch == "x86_64" || arch == "amd64") ? "windows-x64" : null
}()
def streamlineVendorNames = [
	"sl.interposer.dll",
	"sl.common.dll",
	"sl.dlss_d.dll",
	"sl.dlss_g.dll",
	"sl.reflex.dll",
	"sl.pcl.dll",
	"nvngx_dlssd.dll",
	"nvngx_dlssg.dll",
	"NvLowLatencyVk.dll",
	"reflex.license.txt",
	"nvngx_dlss.license.txt"
]
def streamlineSdkVendorRoot = { File sdkRoot ->
	new File(sdkRoot, streamlineVariant == "development" ? "bin/x64/development" : "bin/x64")
}
def streamlineNoticeFiles = [
	"license.txt": "STREAMLINE-SDK-MIT.txt",
	"3rd-party-licenses.md": "STREAMLINE-THIRD-PARTY.md"
]

def streamlineBridgeSourceDir = file("native/streamline_bridge")
def streamlineBridgeBuildDir = file("native/streamline_bridge/build")
def streamlineBridgeCmakeConfig = streamlineBridgeConfig.capitalize()
def streamlineBridgeOutput = new File(layout.buildDirectory.get().asFile,
		"native/streamline_bridge/${streamlineBridgeConfig}/streamlinebridge.dll")
def streamlineBridgeInitTestOutput = new File(layout.buildDirectory.get().asFile,
		"native/streamline_bridge/${streamlineBridgeConfig}/streamlinebridge_production_init_test.exe")
def vulkanSdkEnv = providers.environmentVariable("VULKAN_SDK")

def configureStreamlineBridge = tasks.register("configureStreamlineBridge", Exec) {
	group = "build"
	description = "Configures the Windows x64 Streamline bridge."
	onlyIf { streamlinePlatform != null }
	inputs.files(fileTree(streamlineBridgeSourceDir) { include "CMakeLists.txt", "*.h" })
	inputs.property("streamlineSdk", streamlineSdkEnv.orElse(""))
	inputs.property("vulkanSdk", vulkanSdkEnv.orElse(""))
	outputs.file(new File(streamlineBridgeBuildDir, "CMakeCache.txt"))
	doFirst {
		def sdkRoot = streamlineSdkRootProvider.orNull
		def vulkanRoot = vulkanSdkEnv.orNull
		if (sdkRoot == null) {
			throw new GradleException("STREAMLINE_SDK environment variable is not set.")
		}
		if (!vulkanRoot) {
			throw new GradleException("VULKAN_SDK environment variable is not set.")
		}
		commandLine "cmake", "-S", streamlineBridgeSourceDir.absolutePath,
				"-B", streamlineBridgeBuildDir.absolutePath, "-A", "x64",
				"-DSTREAMLINE_SDK=${sdkRoot.absolutePath}", "-DVULKAN_SDK=${file(vulkanRoot).absolutePath}"
	}
}

def buildStreamlineBridge = tasks.register("buildStreamlineBridge", Exec) {
	group = "build"
	description = "Builds the Windows x64 Streamline bridge."
	onlyIf { streamlinePlatform != null }
	dependsOn(configureStreamlineBridge)
	inputs.files(fileTree(streamlineBridgeSourceDir) { include "*.cpp", "*.h", "CMakeLists.txt" })
	outputs.file(streamlineBridgeOutput)
	doFirst {
		commandLine "cmake", "--build", streamlineBridgeBuildDir.absolutePath,
				"--config", streamlineBridgeCmakeConfig, "--parallel"
	}
}

def testStreamlineBridge = tasks.register("testStreamlineBridge", Exec) {
	group = "verification"
	description = "Runs the native Streamline bridge ABI tests."
	onlyIf { streamlinePlatform != null }
	dependsOn(buildStreamlineBridge)
	commandLine "ctest", "--test-dir", streamlineBridgeBuildDir.absolutePath,
			"-C", streamlineBridgeCmakeConfig, "--output-on-failure"
}

def testPackagedStreamlineBridge = tasks.register("testPackagedStreamlineBridge", Exec) {
	group = "verification"
	description = "Initializes the exact packaged production Streamline directory."
	onlyIf { streamlinePlatform != null && streamlineVariant == "production" }
	dependsOn("bundleStreamlineNatives")
	doFirst {
		def packagedDirectory = new File(streamlineNativeGenRoot.get().asFile,
				"caustica/natives/windows-x64")
		if (!streamlineBridgeInitTestOutput.isFile()) {
			throw new GradleException("Missing production initialization test: ${streamlineBridgeInitTestOutput}")
		}
		commandLine streamlineBridgeInitTestOutput.absolutePath,
				packagedDirectory.absolutePath,
				new File(layout.buildDirectory.get().asFile,
						"test-results/streamline-production-init").absolutePath
