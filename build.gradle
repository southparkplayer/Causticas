import javax.inject.Inject
import org.gradle.process.ExecOperations
import dev.comfyfluffy.caustica.build.GenerateShaderRecords

plugins {
	id "fabric-loom" version "${loom_version}"
	id "maven-publish"
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	maven {
		name = "Fabric"
		url = "https://maven.fabricmc.net/"
	}
	mavenCentral()
}

loom {
	runs {
		client {
			client()
			setConfigName("Fabric Client")
			ideConfigGenerated = true
			runDir = "run"
			// Caustica cannot render on OpenGL. An explicit launch argument also prevents Minecraft's
			// post-crash fallback from silently overriding the persisted Vulkan preference in dev runs.
			programArg "--graphicsBackend"
			programArg "VULKAN"
			// java.lang.foreign restricted methods (FFM bindings to amd_fidelityfx_vk.dll)
			vmArg "--enable-native-access=ALL-UNNAMED"
            // NVIDIA NGX (DLSS) allocates ~1MB on the stack during init, which overflows Java's default 1MB thread stack.
            // pass -Xss here directly so the main render thread is resized before the VM parses JAVA_TOOL_OPTIONS.
            vmArg "-Xss16m"

            // NixOS fix: Gradle forks drop the dev-shell's LD_LIBRARY_PATH.
            // We manually add the driver path so NVIDIA's Streamline plugins can load their driver runtime.
            if (file("/run/opengl-driver/lib").exists()) {
                def inherited = System.getenv("LD_LIBRARY_PATH")
                environmentVariable "LD_LIBRARY_PATH",
                        inherited ? "/run/opengl-driver/lib:${inherited}" : "/run/opengl-driver/lib"
            }
		}

		server {
			server()
			setConfigName("Fabric Server")
			ideConfigGenerated = true
			runDir = "run"
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
	testImplementation platform("org.junit:junit-bom:5.12.2")
	testImplementation "org.junit.jupiter:junit-jupiter"
	testRuntimeOnly "org.junit.platform:junit-platform-launcher"

	// Layered TOML config (config/caustica.toml) — NightConfig, the same library NeoForge's
	// ModConfigSpec is built on.
	include implementation("com.electronwill.night-config:core:3.8.3")
	include implementation("com.electronwill.night-config:toml:3.8.3")
	testImplementation "org.junit.jupiter:junit-jupiter:5.11.4"
	testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.11.4"
}

// Production is the normal artifact. Development plugins remain an explicit diagnostics-only build.
def streamlineVariant = (findProperty("streamlineVariant") ?: "production")
		.toString().toLowerCase(java.util.Locale.ROOT)
if (!(streamlineVariant in ["development", "production"])) {
	throw new GradleException("Unknown Streamline variant '${streamlineVariant}'. Expected 'development' or 'production'.")
}
def streamlineVulkanMailboxVsync = (findProperty("streamlineVulkanMailboxVsync") ?: "false")
		.toString().toBoolean()
if (streamlineVulkanMailboxVsync && streamlineVariant != "development") {
	throw new GradleException("Streamline 2.12 exposes vSyncConfig only in its development plugin; "
			+ "use -PstreamlineVariant=development with -PstreamlineVulkanMailboxVsync=true.")
}

processResources {
	inputs.property "version", project.version
	inputs.property "streamlineVariant", streamlineVariant
	inputs.property "streamlineVulkanMailboxVsync", streamlineVulkanMailboxVsync

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
	filesMatching("caustica/streamline.properties") {
		expand "streamlineVariant": streamlineVariant,
				"streamlineVulkanMailboxVsync": streamlineVulkanMailboxVsync
	}
}

// Compile GLSL and Slang sources to SPIR-V at build time instead of tracking binaries. Requires
// glslangValidator, slangc, and spirv-val from the Vulkan SDK or PATH.
def shaderGenRoot = layout.buildDirectory.dir("generated/shaders") // classpath root -> /caustica/rt/*.spv

def resolveVulkanTool = { String name ->
	def exe = org.gradle.internal.os.OperatingSystem.current().windows ? ".exe" : ""
	def sdk = System.getenv("VULKAN_SDK")
	if (sdk) {
		for (def directory : ["Bin", "bin"]) {
			def fromSdk = file("${sdk}/${directory}/${name}${exe}")
			if (fromSdk.exists()) {
				return fromSdk.absolutePath
			}
		}
	}
	return "${name}${exe}" // fall back to PATH; exec fails with a clear message if absent
}

// Keep the Vulkan SDK and shader compiler identities independent. Streamline's native bridge needs the
// real Vulkan SDK, while production shaders are reviewed and accepted specifically with Slang 2026.13.
def requiredSlangVersion = "2026.13"
def configuredSlangc = (findProperty("slangc") ?: System.getenv("CAUSTICA_SLANGC"))?.toString()
if (!configuredSlangc) {
	throw new GradleException("Pinned Slang ${requiredSlangVersion} is required. Set CAUSTICA_SLANGC "
			+ "or pass -Pslangc=<path-to-slangc>.")
}
def pinnedSlangc = file(configuredSlangc)
if (!pinnedSlangc.isFile()) {
	throw new GradleException("Pinned Slang compiler does not exist: ${pinnedSlangc.absolutePath}")
}
def slangVersionProbe = providers.exec {
	commandLine pinnedSlangc.absolutePath, "-version"
}
def actualSlangVersion = (slangVersionProbe.standardOutput.asText.get()
		+ "\n" + slangVersionProbe.standardError.asText.get()).trim()
if (!actualSlangVersion.readLines().any { it.trim() == requiredSlangVersion }) {
	throw new GradleException("Expected Slang ${requiredSlangVersion}, got '${actualSlangVersion}' from "
			+ pinnedSlangc.absolutePath)
}

// NVIDIA SHaRC is an external, separately licensed shader SDK. Its source is never copied into the
// LGPL source tree; only validated SPIR-V object code and the NVIDIA license enter a runtime JAR.
def sharcVersion = "1.6.5.0"
def sharcCommit = "0b9f58bbc8c41736042d4da964830a247e424a00"
def configuredSharcSdk = (findProperty("sharcSdk") ?: System.getenv("SHARC_SDK") ?: "").toString()
def sharcOptOut = providers.gradleProperty("withoutSharc")
		.map { it.toBoolean() }.getOrElse(false)
if (sharcOptOut && !configuredSharcSdk.isBlank()) {
	throw new GradleException("Choose either a SHARC_SDK/sharcSdk input or -PwithoutSharc=true, not both")
}
def sharcHeaderHashes = [
	"include/HashGridCommon.h": "980D4CE2FE53273D55FE1DD771B155F89BB28C86D19947427F318D8661F082A4",
	"include/SharcCommon.h": "0F61B11E89E0EA80292194DDE6B33478D6E45DD2D9971A77F5658045A9F6BDC3",
	"include/SharcGlsl.h": "C1802A975BC47196709892C89E35C7212BDBB41568A3AC60F37460AAE52F9469",
	"include/SharcTypes.h": "0B9D8AC0A4A8C8B303F6BDD338652CA251E5E5152B47CB55972DDD5904B4CC08",
	"License.md": "8FF8A1723EE41B2647B5B5CD5EF961C7F58FA617803D6DE3EA68F954F85FF419"
]
def validateSharcSdk = {
	if (configuredSharcSdk.isBlank()) return
	def root = file(configuredSharcSdk)
	def digest = java.security.MessageDigest.getInstance("SHA-256")
	def invalid = sharcHeaderHashes.findAll { relative, expected ->
		def candidate = new File(root, relative)
		if (!candidate.isFile()) return true
		digest.reset()
		def actual = digest.digest(candidate.bytes).encodeHex().toString().toUpperCase(java.util.Locale.ROOT)
		return actual != expected
	}.keySet()
	if (!invalid.empty) {
		throw new GradleException("SHARC_SDK is not the pinned NVIDIA SHaRC v${sharcVersion} (${sharcCommit}); "
				+ "missing or hash-mismatched: ${invalid.join(', ')}")
	}
}

abstract class CompileShaders extends DefaultTask {
	@InputDirectory abstract DirectoryProperty getSrcDir()
	@OutputDirectory abstract DirectoryProperty getOutDir()
	@Input abstract Property<String> getGlslang()
	@Input abstract Property<String> getSpirvVal()
	@Input abstract Property<String> getSpirvDis()
	@Input abstract Property<String> getSlangc()
	@Input abstract Property<String> getSharcSdk()

	@Inject abstract ExecOperations getExecOps()

	// world.rgen.slang → "world.rgen"; world.rahit → "world.rahit" (GLSL names pass through).
	static String outBase(File src) {
		return src.name.endsWith(".slang") ? src.name.substring(0, src.name.length() - 6) : src.name
	}

	@TaskAction
	void compile() {
		def outDirFile = outDir.get().asFile
		// Slang stages are named <name>.<stage>.slang (world.rahit.slang → world.rahit.spv); module files
		// like world_common.slang match no stage glob and are picked up only via `import`.
		def stageIncludes = ["rgen", "rchit", "rahit", "rmiss", "rcall", "comp", "vert", "frag"]
				.collectMany { stage -> ["**/*.${stage}", "**/*.${stage}.slang"] }
		def validate = { File spv ->
			execOps.exec {
				commandLine spirvVal.get(), "--target-env", "vulkan1.2", spv.absolutePath
			}
		}
		def compileOne = { File src, File spv, List<String> defines ->
			execOps.exec {
				// -g (OpLine/OpSource debug info), not -gVS: the NonSemantic.Shader.DebugInfo form (-gVS)
				// emits OpExtInstWithForwardRefsKHR (SPV_KHR_relaxed_extended_instruction), which trips a
				// validation error unless the shaderRelaxedExtendedInstruction device feature is enabled.
				// -g keeps source-level debug info for Nsight/RenderDoc without needing that extension.
				commandLine([glslang.get(), "-V", "--target-env", "vulkan1.2", "-g"] + defines
						+ [src.absolutePath, "-o", spv.absolutePath])
			}
			validate(spv)
		}
		def compileOneSlang = { File src, File spv, List<String> extra ->
			execOps.exec {
				commandLine([slangc.get(), src.absolutePath, "-target", "spirv",
						"-profile", "spirv_1_5", "-matrix-layout-column-major",
						"-warnings-as-errors", "all", "-warnings-disable", "41012",
						"-I", new File(srcDir.get().asFile, "world").absolutePath] + extra
						+ ["-o", spv.absolutePath])
			}
			validate(spv)
		}
		def shaderFiles = srcDir.get().asFileTree.matching {
			include stageIncludes
			exclude "sharc/**"
		}.files.sort { it.absolutePath }
		def duplicateOutputs = shaderFiles
				.groupBy { "${outBase(it)}.spv" }
				.findAll { entry -> entry.value.size() > 1 }
		if (!duplicateOutputs.isEmpty()) {
			throw new GradleException("Duplicate shader output name(s): "
					+ duplicateOutputs.collect { entry -> "${entry.key} from ${entry.value*.path.join(', ')}" }.join("; "))
		}
		// Compile into Gradle's task-temporary directory. A compiler or validator failure leaves the last
		// successful published output intact instead of emptying build/generated/shaders halfway through.
		def scratchDir = new File(temporaryDir, "spv")
		if (scratchDir.exists() && !scratchDir.deleteDir()) {
			throw new GradleException("failed to clear shader scratch directory ${scratchDir}")
		}
		scratchDir.mkdirs()
		shaderFiles.each { src ->
			def base = outBase(src)
			def spv = new File(scratchDir, "${base}.spv")
			if (src.name.endsWith(".slang")) {
				// Build both hit-object encodings from one source; RtDeviceBringup selects the supported backend.
				// Live rendering omits invocation reordering. Offline is an independent throughput specialization.
				compileOneSlang(src, spv, base == "world.rgen"
						? ["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=0",
						   "-DCAUSTICA_TRANSPARENCY_HQ=0", "-O2", "-fp-mode", "precise",
						   "-capability", "spvShaderInvocationReorderEXT"] : [])
				if (base == "world.rgen") {
					compileOneSlang(src, new File(scratchDir, "world_base.rgen.spv"),
							["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=1",
							 "-DCAUSTICA_TRANSPARENCY_HQ=0", "-O2", "-fp-mode", "precise"])
					compileOneSlang(src, new File(scratchDir, "world_nv.rgen.spv"),
							["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=0",
							 "-DCAUSTICA_TRANSPARENCY_HQ=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderNV"])
					compileOneSlang(src, new File(scratchDir, "world_base_hq.rgen.spv"),
							["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=1",
							 "-DCAUSTICA_TRANSPARENCY_HQ=1", "-O2", "-fp-mode", "precise"])
					compileOneSlang(src, new File(scratchDir, "world_hq.rgen.spv"),
							["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=0",
							 "-DCAUSTICA_TRANSPARENCY_HQ=1", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderEXT"])
					compileOneSlang(src, new File(scratchDir, "world_nv_hq.rgen.spv"),
							["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=0",
							 "-DCAUSTICA_TRANSPARENCY_HQ=1", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderNV"])
					def nrdDefines = ["-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0", "-DCAUSTICA_NRD=1",
							"-DCAUSTICA_TRANSPARENCY_HQ=0", "-O2", "-fp-mode", "precise"]
					compileOneSlang(src, new File(scratchDir, "world_nrd_base.rgen.spv"),
							nrdDefines + ["-DCAUSTICA_PORTABLE_TRACE=1"])
					compileOneSlang(src, new File(scratchDir, "world_nrd.rgen.spv"),
							nrdDefines + ["-DCAUSTICA_PORTABLE_TRACE=0", "-capability", "spvShaderInvocationReorderEXT"])
					compileOneSlang(src, new File(scratchDir, "world_nrd_nv.rgen.spv"),
							nrdDefines + ["-DCAUSTICA_PORTABLE_TRACE=0", "-capability", "spvShaderInvocationReorderNV"])
					// Offline uses the same transport/material source but a separate entrypoint binary and sampler.
					compileOneSlang(src, new File(scratchDir, "world_offline_base.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_SER=0", "-DCAUSTICA_PORTABLE_TRACE=1", "-O2", "-fp-mode", "precise"])
					compileOneSlang(src, new File(scratchDir, "world_offline.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_SER=1", "-DCAUSTICA_PORTABLE_TRACE=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderEXT"])
					compileOneSlang(src, new File(scratchDir, "world_offline_nv.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_SER=1", "-DCAUSTICA_PORTABLE_TRACE=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderNV"])
					compileOneSlang(src, new File(scratchDir, "world_offline_pilot_base.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_OFFLINE_PILOT=1", "-DCAUSTICA_SER=0",
							 "-DCAUSTICA_PORTABLE_TRACE=1", "-O2", "-fp-mode", "precise"])
					compileOneSlang(src, new File(scratchDir, "world_offline_pilot.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_OFFLINE_PILOT=1", "-DCAUSTICA_SER=1",
							 "-DCAUSTICA_PORTABLE_TRACE=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderEXT"])
					compileOneSlang(src, new File(scratchDir, "world_offline_pilot_nv.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_OFFLINE_PILOT=1", "-DCAUSTICA_SER=1",
							 "-DCAUSTICA_PORTABLE_TRACE=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderNV"])
					compileOneSlang(src, new File(scratchDir, "world_offline_indirect_base.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_OFFLINE_INDIRECT=1", "-DCAUSTICA_SER=0",
							 "-DCAUSTICA_PORTABLE_TRACE=1", "-O2", "-fp-mode", "precise"])
					compileOneSlang(src, new File(scratchDir, "world_offline_indirect.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_OFFLINE_INDIRECT=1", "-DCAUSTICA_SER=1",
							 "-DCAUSTICA_PORTABLE_TRACE=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderEXT"])
					compileOneSlang(src, new File(scratchDir, "world_offline_indirect_nv.rgen.spv"),
							["-DCAUSTICA_OFFLINE=1", "-DCAUSTICA_OFFLINE_INDIRECT=1", "-DCAUSTICA_SER=1",
							 "-DCAUSTICA_PORTABLE_TRACE=0", "-O2", "-fp-mode", "precise",
							 "-capability", "spvShaderInvocationReorderNV"])
				}
			} else {
				def particleHistory = base == "dlssd_disocclusion.comp"
				compileOne(src, spv, particleHistory ? ["-DCAUSTICA_PARTICLE_TEMPORAL_HISTORY=0"] : [])
				if (particleHistory) {
					compileOne(src, new File(scratchDir, "dlssd_disocclusion_particle_history.comp.spv"),
							["-DCAUSTICA_PARTICLE_TEMPORAL_HISTORY=1"])
				}
			}
		}
		def sharcRootPath = sharcSdk.get()
		if (!sharcRootPath.isBlank()) {
			def sharcRoot = new File(sharcRootPath)
			def sharcInclude = ["-I", new File(srcDir.get().asFile, "world").absolutePath,
					"-I", new File(srcDir.get().asFile, "sharc").absolutePath,
					"-I", new File(sharcRoot, "include").absolutePath]
			def variantDefines = ["-DCAUSTICA_SHARC=1", "-DCAUSTICA_OFFLINE=0", "-DCAUSTICA_SER=0",
					"-O2", "-fp-mode", "precise"]
			def queryDefines = variantDefines + ["-DCAUSTICA_SHARC_QUERY=1", "-DCAUSTICA_SHARC_UPDATE=0",
					"-DCAUSTICA_SHARC_DIAGNOSTICS=0"]
			def diffuseQueryDefines = queryDefines + ["-DCAUSTICA_SHARC_GLOSSY=0",
					"-DCAUSTICA_SHARC_LIVE_SECONDARY_DIRECT=1"]
			def primaryQueryDefines = queryDefines + ["-DCAUSTICA_SHARC_PRIMARY_DIFFUSE=1"]
			def updateDefines = variantDefines + ["-DCAUSTICA_SHARC_QUERY=0", "-DCAUSTICA_SHARC_UPDATE=1",
					"-DCAUSTICA_SHARC_DIAGNOSTICS=0",
					"-warnings-disable", "41000"]
			def diagnosticQueryDefines = variantDefines + ["-DCAUSTICA_SHARC_QUERY=1",
					"-DCAUSTICA_SHARC_UPDATE=0", "-DCAUSTICA_SHARC_DIAGNOSTICS=1"]
			def primaryDiagnosticQueryDefines = diagnosticQueryDefines +
					["-DCAUSTICA_SHARC_PRIMARY_DIFFUSE=1"]
			def diagnosticUpdateDefines = variantDefines + ["-DCAUSTICA_SHARC_QUERY=0",
					"-DCAUSTICA_SHARC_UPDATE=1", "-DCAUSTICA_SHARC_DIAGNOSTICS=1",
					"-warnings-disable", "41000"]
			def world = new File(srcDir.get().asFile, "world")
			def sharc = new File(srcDir.get().asFile, "sharc")
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc.rgen.spv"),
					queryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_base.rgen.spv"),
					queryDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_nv.rgen.spv"),
					queryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_diffuse.rgen.spv"),
					diffuseQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_diffuse_base.rgen.spv"),
					diffuseQueryDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_diffuse_nv.rgen.spv"),
					diffuseQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_primary.rgen.spv"),
					primaryQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_primary_base.rgen.spv"),
					primaryQueryDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_primary_nv.rgen.spv"),
					primaryQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_update.rgen.spv"),
					updateDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_update_base.rgen.spv"),
					updateDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_update_nv.rgen.spv"),
					updateDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_diagnostic.rgen.spv"),
					diagnosticQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_diagnostic_base.rgen.spv"),
					diagnosticQueryDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_diagnostic_nv.rgen.spv"),
					diagnosticQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_primary_diagnostic.rgen.spv"),
					primaryDiagnosticQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_primary_diagnostic_base.rgen.spv"),
					primaryDiagnosticQueryDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_primary_diagnostic_nv.rgen.spv"),
					primaryDiagnosticQueryDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_update_diagnostic.rgen.spv"),
					diagnosticUpdateDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderEXT"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_update_diagnostic_base.rgen.spv"),
					diagnosticUpdateDefines + sharcInclude + ["-DCAUSTICA_PORTABLE_TRACE=1"])
			compileOneSlang(new File(world, "world.rgen.slang"), new File(scratchDir, "world_sharc_update_diagnostic_nv.rgen.spv"),
					diagnosticUpdateDefines + sharcInclude + ["-capability", "spvShaderInvocationReorderNV"])
			[
					"world.rchit.slang": "world_sharc.rchit.spv",
					"world.rahit.slang": "world_sharc.rahit.spv",
					"world.rmiss.slang": "world_sharc.rmiss.spv",
					"world_guide.rmiss.slang": "world_sharc_guide.rmiss.spv"
			].each { sourceName, outputName ->
				compileOneSlang(new File(world, sourceName), new File(scratchDir, outputName),
						variantDefines + sharcInclude)
			}
			compileOneSlang(new File(sharc, "sharc_resolve.comp.slang"),
					new File(scratchDir, "sharc_resolve.comp.spv"), sharcInclude)
			// Prove the exact BDA + native 64-bit atomic contract independently of the runtime shaders.
			compileOneSlang(new File(sharc, "sharc_atomic_probe.comp.slang"),
					new File(temporaryDir, "sharc_atomic_probe.comp.spv"), sharcInclude)
			["world_sharc.rgen.spv", "world_sharc_nv.rgen.spv"].each { name ->
				def raygen = new File(scratchDir, name)
				if (!raygen.isFile() || raygen.length() > 200_000L) {
					throw new GradleException("SHaRC query raygen complexity budget exceeded: ${name} is "
							+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 200000)")
				}
			}
			["world_sharc_diffuse.rgen.spv", "world_sharc_diffuse_nv.rgen.spv"].each { name ->
				def raygen = new File(scratchDir, name)
				if (!raygen.isFile() || raygen.length() > 200_000L) {
					throw new GradleException("SHaRC diffuse-query raygen complexity budget exceeded: ${name} is "
							+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 200000)")
				}
			}
			["world_sharc_primary.rgen.spv", "world_sharc_primary_nv.rgen.spv"].each { name ->
				def raygen = new File(scratchDir, name)
				if (!raygen.isFile() || raygen.length() > 200_000L) {
					throw new GradleException("SHaRC primary-query raygen complexity budget exceeded: ${name} is "
							+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 200000)")
				}
			}
		}
		// The live raygen owns the camera-only physical atmosphere boundary and vanilla-controlled section
		// reveal. RIS emitter-NEE requires additional code; keep the ceiling generous enough for the live
		// transport path while still catching runaway inlining.
		["world_base.rgen.spv", "world.rgen.spv", "world_nv.rgen.spv"].each { name ->
			def raygen = new File(scratchDir, name)
			if (!raygen.isFile() || raygen.length() > 200_000L) {
				throw new GradleException("Glass-only world raygen complexity budget exceeded: ${name} is "
						+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 200000)")
			}
			def disassembly = new File(temporaryDir, "${name}.spvasm")
			execOps.exec {
				commandLine spirvDis.get(), "--raw-id", raygen.absolutePath, "-o", disassembly.absolutePath
			}
			def assembly = disassembly.getText("UTF-8")
			if (assembly.contains("OpFunctionCall")) {
				throw new GradleException("Live world raygen must not contain callable shader functions: ${name}")
			}
			// Upstream's live renderer deliberately performs hit-object invocation reordering before
			// divergent material evaluation. Both EXT and NV variants are emitted and selected at runtime.
			["sampleHash", "owenScramble", "beginBounce", "rndf"].each { functionName ->
				def nameMatch = (assembly =~ /OpName\s+(%\d+)\s+"${functionName}"/)
				if (nameMatch.find()) {
					def functionId = java.util.regex.Pattern.quote(nameMatch.group(1))
					if ((assembly =~ /OpFunctionCall[^\r\n]*${functionId}(?:\s|$)/).find()) {
						throw new GradleException("Live raygen sampler must be fully inlined: ${name} calls ${functionName}")
					}
				}
			}
		}
		["world_nrd_base.rgen.spv", "world_nrd.rgen.spv", "world_nrd_nv.rgen.spv"].each { name ->
			def raygen = new File(scratchDir, name)
			if (!raygen.isFile() || raygen.length() > 200_000L) {
				throw new GradleException("NRD world raygen complexity budget exceeded: ${name} is "
						+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 200000)")
			}
		}
		["world_offline_base.rgen.spv", "world_offline.rgen.spv", "world_offline_nv.rgen.spv"].each { name ->
			def raygen = new File(scratchDir, name)
			if (!raygen.isFile() || raygen.length() > 124_000L) {
				throw new GradleException("Offline world raygen complexity budget exceeded: ${name} is "
						+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 124000)")
			}
			def disassembly = new File(temporaryDir, "${name}.spvasm")
			execOps.exec {
				commandLine spirvDis.get(), "--raw-id", raygen.absolutePath, "-o", disassembly.absolutePath
			}
			def hasReorder = (disassembly.getText("UTF-8") =~ /OpReorderThreadWithHitObject(?:EXT|NV)/).find()
			if (name == "world_offline_base.rgen.spv" ? hasReorder : !hasReorder) {
				throw new GradleException(name == "world_offline_base.rgen.spv"
						? "Baseline offline world raygen unexpectedly contains invocation reorder"
						: "Offline world raygen is missing its independent invocation reorder: ${name}")
			}
		}
		["world_offline_pilot_base.rgen.spv", "world_offline_pilot.rgen.spv", "world_offline_pilot_nv.rgen.spv"].each { name ->
			def raygen = new File(scratchDir, name)
			if (!raygen.isFile() || raygen.length() > 124_000L) {
				throw new GradleException("Offline pilot raygen complexity budget exceeded: ${name} is "
						+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 124000)")
			}
		}
		["world_offline_indirect_base.rgen.spv", "world_offline_indirect.rgen.spv", "world_offline_indirect_nv.rgen.spv"].each { name ->
			def raygen = new File(scratchDir, name)
			if (!raygen.isFile() || raygen.length() > 124_000L) {
				throw new GradleException("Offline indirect raygen complexity budget exceeded: ${name} is "
						+ "${raygen.isFile() ? raygen.length() : 'missing'} bytes (limit 124000)")
			}
		}
		scratchDir.listFiles().findAll { it.name.startsWith("world_sharc") && it.name.endsWith(".rgen.spv") }
				.each { raygen ->
					def disassembly = new File(temporaryDir, "${raygen.name}.spvasm")
					execOps.exec {
						commandLine spirvDis.get(), "--raw-id", raygen.absolutePath, "-o", disassembly.absolutePath
					}
					if ((disassembly.getText("UTF-8") =~ /OpReorderThreadWithHitObject(?:EXT|NV)/).find()) {
						throw new GradleException("Live SHaRC raygen unexpectedly contains invocation reorder: ${raygen.name}")
					}
				}
		outDirFile.mkdirs()
		outDirFile.listFiles().findAll { it.isFile() && it.name.endsWith(".spv") }.each { it.delete() }
		scratchDir.listFiles().findAll { it.isFile() }.each { src ->
			java.nio.file.Files.move(src.toPath(), new File(outDirFile, src.name).toPath(),
					java.nio.file.StandardCopyOption.REPLACE_EXISTING)
		}
	}
}

