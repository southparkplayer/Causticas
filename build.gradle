java {
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
	withSourcesJar()
}

// Source distributions contain project source, not generated shaders or NVIDIA's proprietary runtime payloads.
tasks.named("sourcesJar", Jar).configure {
	from("shaders/display/output_scale.comp") {
		into "shaders/display"
	}
	from("licenses/AMD-FidelityFX-FSR1.txt") {
		into "META-INF/licenses/amd"
	}
	exclude "caustica/natives/**"
	exclude "caustica/rt/*.spv"
	exclude "caustica/streamline.properties"
	exclude "caustica/sharc.properties"
	exclude "META-INF/licenses/nvidia/NVIDIA-SHARC-SDK.txt"
}

tasks.named("jar", Jar).configure {
	doFirst {
		if (streamlineVariant == "production" && configuredSharcSdk.isBlank() && !sharcOptOut) {
			throw new GradleException("Production JARs include SHaRC by default. Configure SHARC_SDK/sharcSdk "
					+ "or explicitly request a SHaRC-free artifact with -PwithoutSharc=true.")
		}
	}
	from(rootProject.files("LICENSE.md", "COPYING", "COPYING.LESSER", "THIRD_PARTY_NOTICES.md",
			"DISTRIBUTION_NOTICE.md")) {
		into "META-INF"
	}
	from(rootProject.file("licenses/AMD-FidelityFX-FSR1.txt")) {
		into "META-INF/licenses/amd"
	}
}

def verifyProductionArtifact = tasks.register("verifyProductionArtifact") {
	group = "verification"
	description = "Verifies the exact production runtime and source JAR distribution boundary."
	dependsOn(tasks.named("jar"), tasks.named("sourcesJar"))
	onlyIf { streamlinePlatform != null && streamlineVariant == "production" }
	doLast {
		def runtimeJar = tasks.named("jar", Jar).get().archiveFile.get().asFile
		def sourceJar = tasks.named("sourcesJar", Jar).get().archiveFile.get().asFile
		def required = [
			"fabric.mod.json",
			"caustica/rt/world.rgen.spv",
			"caustica/rt/world_nv.rgen.spv",
			"caustica/rt/world_base.rgen.spv",
			"caustica/rt/world_hq.rgen.spv",
			"caustica/rt/world_nv_hq.rgen.spv",
			"caustica/rt/world_base_hq.rgen.spv",
			"caustica/rt/world_nrd_base.rgen.spv",
			"caustica/rt/world_nrd.rgen.spv",
			"caustica/rt/world_nrd_nv.rgen.spv",
			"caustica/rt/world_offline_base.rgen.spv",
			"caustica/rt/world_offline.rgen.spv",
			"caustica/rt/world_offline_nv.rgen.spv",
			"caustica/rt/world_offline_pilot_base.rgen.spv",
			"caustica/rt/world_offline_pilot.rgen.spv",
			"caustica/rt/world_offline_pilot_nv.rgen.spv",
			"caustica/rt/world_offline_indirect_base.rgen.spv",
			"caustica/rt/world_offline_indirect.rgen.spv",
			"caustica/rt/world_offline_indirect_nv.rgen.spv",
			"caustica/rt/offline_schedule.comp.spv",
			"caustica/rt/world_shadow.rchit.spv",
			"caustica/rt/world_shadow.rmiss.spv",
			"caustica/rt/nrd_resolve.comp.spv",
			"caustica/rt/nrd_spatial_upscale.comp.spv",
			"caustica/rt/dlssd_disocclusion.comp.spv",
			"caustica/rt/dlssd_disocclusion_particle_history.comp.spv",
			"caustica/rt/sky_stars.comp.spv",
			"caustica/streamline.properties",
			"caustica/sharc.properties",
			"caustica/natives/windows-x64/nrdbridge.dll",
			"caustica/natives/windows-x64/streamlinebridge.dll",
			"caustica/natives/windows-x64/sl.interposer.dll",
			"caustica/natives/windows-x64/sl.dlss_d.dll",
			"caustica/natives/windows-x64/sl.dlss_g.dll",
			"caustica/natives/windows-x64/nvngx_dlssd.dll",
			"caustica/natives/windows-x64/nvngx_dlssg.dll",
			"META-INF/DISTRIBUTION_NOTICE.md",
			"META-INF/THIRD_PARTY_NOTICES.md",
			"META-INF/licenses/amd/AMD-FidelityFX-FSR1.txt",
			"META-INF/licenses/nvidia/STREAMLINE-SDK-MIT.txt",
			"META-INF/licenses/nvidia/STREAMLINE-THIRD-PARTY.md",
			"META-INF/licenses/nvidia/NVIDIA-RTX-SDKS.txt",
			"META-INF/licenses/nvidia/NVIDIA-REFLEX-SDK.txt",
			"META-INF/licenses/nvidia/NVIDIA-NRD.txt"
		]
		if (providers.environmentVariable("NRD_LINUX_X64").isPresent()) {
			required.add("caustica/natives/linux-x64/libnrdbridge.so")
		}
		if (!configuredSharcSdk.isBlank()) {
				required.addAll([
				"caustica/rt/world_sharc_base.rgen.spv",
				"caustica/rt/world_sharc.rgen.spv",
				"caustica/rt/world_sharc_nv.rgen.spv",
				"caustica/rt/world_sharc_diffuse.rgen.spv",
				"caustica/rt/world_sharc_diffuse_nv.rgen.spv",
				"caustica/rt/world_sharc_diffuse_base.rgen.spv",
				"caustica/rt/world_sharc_primary.rgen.spv",
				"caustica/rt/world_sharc_primary_nv.rgen.spv",
				"caustica/rt/world_sharc_primary_base.rgen.spv",
				"caustica/rt/world_sharc_update.rgen.spv",
				"caustica/rt/world_sharc_update_nv.rgen.spv",
				"caustica/rt/world_sharc_update_base.rgen.spv",
				"caustica/rt/world_sharc_diagnostic.rgen.spv",
				"caustica/rt/world_sharc_diagnostic_nv.rgen.spv",
				"caustica/rt/world_sharc_diagnostic_base.rgen.spv",
				"caustica/rt/world_sharc_primary_diagnostic.rgen.spv",
				"caustica/rt/world_sharc_primary_diagnostic_nv.rgen.spv",
				"caustica/rt/world_sharc_primary_diagnostic_base.rgen.spv",
				"caustica/rt/world_sharc_update_diagnostic.rgen.spv",
				"caustica/rt/world_sharc_update_diagnostic_nv.rgen.spv",
				"caustica/rt/world_sharc_update_diagnostic_base.rgen.spv",
				"caustica/rt/world_sharc.rchit.spv",
				"caustica/rt/world_sharc.rahit.spv",
				"caustica/rt/world_sharc.rmiss.spv",
				"caustica/rt/world_sharc_guide.rmiss.spv",
				"caustica/rt/sharc_resolve.comp.spv",
				"META-INF/licenses/nvidia/NVIDIA-SHARC-SDK.txt"
			])
		}
		def runtimeZip = new java.util.zip.ZipFile(runtimeJar)
		try {
			def names = runtimeZip.entries().collect { it.name } as Set
			def missing = required.findAll { !names.contains(it) }
			if (!missing.empty) {
				throw new GradleException("Production JAR is missing release entries: ${missing.join(', ')}")
			}
			def forbidden = names.findAll { name ->
				name.toLowerCase(java.util.Locale.ROOT).contains("/development/")
						|| name.toLowerCase(java.util.Locale.ROOT).endsWith(".pdb")
						|| name.startsWith("include/") || name.endsWith(".h")
			}
			if (!forbidden.empty) {
				throw new GradleException("Production JAR contains non-redistributable development inputs: "
						+ forbidden.join(', '))
			}
			def properties = runtimeZip.getInputStream(runtimeZip.getEntry("caustica/streamline.properties"))
					.getText("UTF-8")
			if (!properties.readLines().contains("variant=production")) {
				throw new GradleException("Production JAR does not identify the production Streamline variant")
			}
			def sharcProperties = new Properties()
			runtimeZip.getInputStream(runtimeZip.getEntry("caustica/sharc.properties")).withCloseable {
				sharcProperties.load(it)
			}
			def expectedSharcArtifacts = configuredSharcSdk.isBlank() ? "false" : "true"
			if (sharcProperties.getProperty("artifacts") != expectedSharcArtifacts
					|| sharcProperties.getProperty("explicitOptOut") != Boolean.toString(sharcOptOut)
					|| sharcProperties.getProperty("version") != sharcVersion
					|| sharcProperties.getProperty("commit") != sharcCommit) {
				throw new GradleException("Production JAR SHaRC capability marker is inconsistent")
			}
		} finally {
			runtimeZip.close()
		}

		def sourceZip = new java.util.zip.ZipFile(sourceJar)
		try {
			def leaked = sourceZip.entries().collect { it.name }.findAll { name ->
				name.startsWith("caustica/natives/") || name.endsWith(".spv")
						|| name == "caustica/streamline.properties" || name == "caustica/sharc.properties"
						|| name == "META-INF/licenses/nvidia/NVIDIA-SHARC-SDK.txt"
			}
			if (!leaked.empty) {
				throw new GradleException("Sources JAR leaks generated/proprietary payloads: ${leaked.join(', ')}")
			}
		} finally {
			sourceZip.close()
		}
	}
}

tasks.named("build").configure {
	dependsOn(verifyProductionArtifact)
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}
}
