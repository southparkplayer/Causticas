name: Production candidate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  VULKAN_SDK_VERSION: 1.4.350.0
  SLANG_VERSION: "2026.13"
  SLANG_SHA256: 6bae110faa3b51ea00316e0a1dd4f40b11eb196a2e3a135074300bf2d5d4c777

jobs:
  build:
    name: Build Windows Streamline candidate
    runs-on: windows-2022

    steps:
      - name: Checkout Caustica
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: ${{ env.VULKAN_SDK_VERSION }}
          vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang, SPIRV-Tools
          vulkan-use-cache: true

      - name: Install pinned Slang
        shell: pwsh
        run: |
          $archive = "slang-$env:SLANG_VERSION-windows-x86_64.zip"
          $url = "https://github.com/shader-slang/slang/releases/download/v$env:SLANG_VERSION/$archive"
          Invoke-WebRequest -Uri $url -OutFile $archive
          if ((Get-FileHash $archive -Algorithm SHA256).Hash -ne $env:SLANG_SHA256.ToUpperInvariant()) {
            throw "Pinned Slang archive hash mismatch"
          }
          $root = Join-Path $env:RUNNER_TEMP "slang-$env:SLANG_VERSION"
          Expand-Archive -LiteralPath $archive -DestinationPath $root
          $slangc = Get-ChildItem $root -Recurse -Filter slangc.exe | Select-Object -First 1
          if (-not $slangc) { throw "slangc.exe was not found" }
          "CAUSTICA_SLANGC=$($slangc.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $slangc.FullName -version

      - name: Download private Streamline 2.12 production SDK
        shell: pwsh
        env:
          STREAMLINE_SDK_URL: ${{ secrets.STREAMLINE_SDK_URL }}
          STREAMLINE_SDK_SHA256: ${{ secrets.STREAMLINE_SDK_SHA256 }}
        run: |
          if (-not $env:STREAMLINE_SDK_URL -or -not $env:STREAMLINE_SDK_SHA256) {
            throw "Configure STREAMLINE_SDK_URL and STREAMLINE_SDK_SHA256 repository secrets"
          }
          $archive = Join-Path $env:RUNNER_TEMP 'streamline-sdk.zip'
          Invoke-WebRequest -Uri $env:STREAMLINE_SDK_URL -OutFile $archive
          if ((Get-FileHash $archive -Algorithm SHA256).Hash -ne $env:STREAMLINE_SDK_SHA256.ToUpperInvariant()) {
            throw "Streamline SDK archive hash mismatch"
          }
          $extract = Join-Path $env:RUNNER_TEMP 'streamline-sdk'
          Expand-Archive -LiteralPath $archive -DestinationPath $extract
          $interposer = Get-ChildItem $extract -Recurse -Filter sl.interposer.dll |
            Where-Object { $_.FullName -match '[\\/]bin[\\/]x64[\\/]sl\.interposer\.dll$' } |
            Select-Object -First 1
          if (-not $interposer) { throw "Streamline production bin/x64 directory was not found" }
          $sdk = Split-Path (Split-Path (Split-Path $interposer.FullName -Parent) -Parent) -Parent
          "STREAMLINE_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and test exact production candidate
        shell: pwsh
        run: .\gradlew.bat clean build --stacktrace

      - name: Record candidate hashes
        shell: pwsh
        run: |
          $hashes = Get-FileHash build\libs\*.jar -Algorithm SHA256 |
            Select-Object @{Name='File';Expression={ Split-Path $_.Path -Leaf }}, Algorithm, Hash
          $hashes | Format-Table -AutoSize
          New-Item -ItemType Directory -Path build\reports -Force | Out-Null
          $hashes | ConvertTo-Json | Set-Content build\reports\production-candidate-sha256.json -Encoding UTF8

      - name: Upload candidate for review
        uses: actions/upload-artifact@v4
        with:
          name: caustica-production-candidate-${{ github.sha }}
          path: |
            build/libs/caustica-*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
            build/reports/production-candidate-sha256.json
          if-no-files-found: error
          retention-days: 7
