name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "native/**"
      - "shaders/**"
      - "src/**"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "native/**"
      - "shaders/**"
      - "src/**"
      - "tools/**"

permissions:
  contents: read

env:
  VULKAN_SDK_VERSION: 1.4.350.0
  VULKAN_SDK_SHA256: b65f068ab36263559da49d7cacd7e7b9df23824ca8b68ccc522a2b06f5725df2
  SLANG_VERSION: "2026.13"
  SLANG_SHA256: fd86d236b31e38577eb14a040aacb8179cbd9b3289f09ca7aca483886c50f589

jobs:
  validate:
    name: Java, shaders, and source contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Caustica
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Vulkan shader tools
        shell: bash
        run: |
          set -euo pipefail
          archive="vulkansdk-linux-x86_64-${VULKAN_SDK_VERSION}.tar.xz"
          url="https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/linux/${archive}"
          sdk_parent="${RUNNER_TEMP}/vulkan-sdk"
          sdk_root="${sdk_parent}/${VULKAN_SDK_VERSION}/x86_64"
          curl --fail --location --retry 3 --retry-delay 5 --output "${archive}" "${url}"
          echo "${VULKAN_SDK_SHA256}  ${archive}" | sha256sum --check
          mkdir -p "${sdk_parent}"
          tar -xf "${archive}" -C "${sdk_parent}"
          echo "VULKAN_SDK=${sdk_root}" >> "${GITHUB_ENV}"
          echo "${sdk_root}/bin" >> "${GITHUB_PATH}"

      - name: Install pinned Slang
        shell: bash
        run: |
          set -euo pipefail
          archive="slang-${SLANG_VERSION}-linux-x86_64-glibc-2.27.tar.gz"
          url="https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/${archive}"
          root="${RUNNER_TEMP}/slang-${SLANG_VERSION}"
          curl --fail --location --retry 3 --retry-delay 5 --output "${archive}" "${url}"
          echo "${SLANG_SHA256}  ${archive}" | sha256sum --check
          mkdir -p "${root}"
          tar -xf "${archive}" -C "${root}"
          slangc="$(find "${root}" -type f -name slangc -perm -u+x | head -n 1)"
          test -n "${slangc}"
          echo "CAUSTICA_SLANGC=${slangc}" >> "${GITHUB_ENV}"
          "${slangc}" -version

      - name: Validate Java and shaders
        shell: bash
        run: ./gradlew check --stacktrace

      - name: Explain artifact boundary
        shell: bash
        run: |
          echo "CI validates portable Java and shader contracts only."
          echo "It intentionally does not publish a JAR without the licensed Windows Streamline production bundle."
